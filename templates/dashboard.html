<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Kirnos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #1a0000, #000);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.6);
}

.logo {
    color: red;
    font-weight: bold;
}

.menu a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

/* HEADER */
.header {
    text-align: center;
    margin-top: 40px;
}

.status {
    margin-top: 10px;
    padding: 8px 20px;
    border-radius: 20px;
    display: inline-block;
}

.premium {
    background: red;
}

.free {
    background: gray;
}

/* CARDS */
.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
}

.card {
    background: rgba(255,0,0,0.1);
    padding: 30px;
    border-radius: 15px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,0,0,0.3);
}

/* BUTTONS */
.btn {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: red;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">KIRNOS</div>
    <div class="menu">
        <a href="/">Accueil</a>
        <a href="/documentation">Docs</a>
        <a href="/faq">FAQ</a>
        <a href="/support">Support</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Dashboard</h1>
    <p>Bienvenue sur Kirnos 🔥</p>

    {% if premium %}
        <div class="status premium">🔥 Premium Actif</div>
    {% else %}
        <div class="status free">❌ Gratuit</div>
    {% endif %}
</div>

<!-- CARDS -->
<div class="cards">

    <div class="card">
        <h3>🛡️ Anti Troll</h3>
        <p>Bloque les insultes</p>
        <button class="btn">Activer</button>
    </div>

    <div class="card">
        <h3>⚔️ Anti Raid</h3>
        <p>Protection en live</p>
        <button class="btn">Activer</button>
    </div>

    <div class="card">
        <h3>📊 Stats</h3>
        <p>Voir les données</p>
        <button class="btn">Voir</button>
    </div>

    <div class="card">
    <h3>🤖 Bot Protection</h3>
    <p id="status">Chargement...</p>

    <button class="btn" onclick="startBot()">Démarrer</button>
    <button class="btn" onclick="stopBot()">Stop</button>
</div>

</div>

<script>
async function startBot() {
    await fetch("/bot/start");
    updateStatus();
}

async function stopBot() {
    await fetch("/bot/stop");
    updateStatus();
}

async function updateStatus() {
    let res = await fetch("/bot/status");
    let data = await res.json();

    let status = document.getElementById("status");

    if (data.running) {
        status.innerText = "🟢 Bot actif";
    } else {
        status.innerText = "🔴 Bot arrêté";
    }
}

setInterval(updateStatus, 2000);
updateStatus();
</script>

</body>
</html>
