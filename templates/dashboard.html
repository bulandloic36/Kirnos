<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard - Kirnos</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
color:#ff2a2a;
font-weight:bold;
}

.logout{
color:white;
text-decoration:none;
}

/* CONTAINER */
.container{
padding:40px;
}

/* STATS */
.stats{
display:flex;
gap:20px;
margin-bottom:40px;
}

.card{
flex:1;
background:#111;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(255,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px red;
}

.card h2{
color:#ff2a2a;
}

/* STATUS */
.status{
margin-bottom:30px;
padding:15px;
background:#111;
border-radius:10px;
}

/* LOGS */
.logs{
background:#111;
padding:20px;
border-radius:10px;
height:300px;
overflow-y:auto;
font-size:14px;
border:1px solid #222;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
<div class="logo">KIRNOS Dashboard</div>
<a href="/" class="logout">Retour</a>
</div>

<div class="container">

<!-- STATUS -->
<div class="status">
🟢 Bot en ligne - Protection active
</div>

<!-- STATS -->
<div class="stats">
<div class="card">
<h2 id="msg">0</h2>
<p>Messages</p>
</div>

<div class="card">
<h2 id="insult">0</h2>
<p>Insultes</p>
</div>

<div class="card">
<h2 id="spam">0</h2>
<p>Spam</p>
</div>
</div>

<!-- LOGS -->
<h3>📜 Activité en direct</h3>
<div class="logs" id="logs">
Chargement...
</div>

</div>

<script>

async function loadLogs(){
    try{
        const res = await fetch("/live");
        const text = await res.text();
        document.getElementById("logs").innerText = text;
    }catch{
        document.getElementById("logs").innerText = "Erreur chargement";
    }
}

setInterval(loadLogs, 2000);
loadLogs();

</script>

</body>
</html>
