<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
color:white;

/* 🔥 IMAGE PROPRE + BIEN POSITIONNÉE */
background:
linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
url("/static/kirnos.jpg");

background-size:cover;
background-position:center 75%;
background-repeat:no-repeat;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:26px;
font-weight:bold;
color:#ff2a2a;
letter-spacing:2px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
cursor:pointer;
opacity:0.7;
transition:0.3s;
}

.menu a:hover{
opacity:1;
color:#ff2a2a;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px 60px;
}

.hero h1{
font-size:80px;
margin:0;
letter-spacing:3px;
}

.hero p{
opacity:0.8;
margin-top:10px;
}

/* BOUTON */

.btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:#ff2a2a;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px rgba(255,0,0,0.6);
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 40px red;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.feature{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:15px;
width:250px;
text-align:center;

transition:0.3s;
}

.feature:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

/* 🔥 PANEL */

.panel{
display:none;
margin:40px auto;
width:80%;
max-width:900px;

background:linear-gradient(145deg,#8b0000,#400000);
border-radius:20px;
padding:35px;
text-align:center;

border:2px solid black;

box-shadow:
0 10px 50px rgba(0,0,0,0.9);

animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* TITRES PANEL */

.panel h2{
margin-bottom:20px;
color:white;
}

/* LIENS */

.panel a{
color:white;
text-decoration:none;
display:block;
margin:10px 0;
transition:0.3s;
}

.panel a:hover{
color:#ff2a2a;
}

/* MOBILE */

@media screen and (max-width:768px){
.hero h1{
font-size:50px;
}
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<div class="logo">KIRNOS</div>

<div class="menu">
<a onclick="openPanel('docs')">Documentation</a>
<a onclick="openPanel('premium')">Premium</a>
<a onclick="openPanel('status')">Status</a>
<a onclick="openPanel('support')">Support</a>
</div>
</div>

<!-- HERO -->

<div class="hero">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>

<a href="/connect" class="btn">Connecter TikTok</a>
</div>

<!-- FEATURES -->

<div class="features">

<div class="feature">
<h3>IA Anti Troll</h3>
<p>Protection automatique</p>
</div>

<div class="feature">
<h3>Anti Raid</h3>
<p>Blocage des attaques</p>
</div>

<div class="feature">
<h3>Dashboard</h3>
<p>Stats en direct</p>
</div>

</div>

<!-- PANEL -->

<div id="panel" class="panel"></div>

<script>

function openPanel(type){

let panel = document.getElementById("panel");
panel.style.display = "block";

if(type === "docs"){
panel.innerHTML = `
<h2>Documentation</h2>
<p>Connexion du compte TikTok</p>
<p>Activation des protections automatiques</p>
<p>Gestion du chat en temps réel</p>
<p>Configuration du bot</p>
<br>
<p>1 semaine gratuite puis abonnement</p>
`;
}

if(type === "premium"){
panel.innerHTML = `
<h2>Premium</h2>
<p>1 mois : 10€</p>
<p>3 mois : 30€</p>
<p>6 mois : 50€</p>
<br>
<p>Paiement sécurisé :</p>
<p>Carte bancaire</p>
<p>PayPal</p>
`;
}

if(type === "status"){
panel.innerHTML = `
<h2>Status</h2>
<p>Serveur : En ligne</p>
<p>API TikTok : Fonctionnelle</p>
<p>Protection : Active</p>
`;
}

if(type === "support"){
panel.innerHTML = `
<h2>Support</h2>
<a href="https://discord.gg/72372NQEu" target="_blank">Discord</a>
<a href="https://twitter.com/KIRNOS350102" target="_blank">Twitter / X</a>
<a href="https://tiktok.com/@kirnos24" target="_blank">TikTok</a>
<a href="https://wa.me/33743260248" target="_blank">WhatsApp</a>
`;
}

}

</script>

</body>
</html>
