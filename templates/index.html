<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
color:white;

/* 🔥 TON FOND ROUGE PROPRE */
background:linear-gradient(120deg,#0b0b0b,#2a0000,#5a0000,#0b0b0b);
background-size:400% 400%;
animation:bgmove 15s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff2a2a;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
color:white;
text-decoration:none;
cursor:pointer;
opacity:0.8;
}

.menu a:hover{
color:#ff2a2a;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
padding:80px 40px;
}

/* TEXTE GAUCHE */

.hero-left{
max-width:500px;
}

.hero-left h1{
font-size:70px;
margin:0;
}

.hero-left p{
opacity:0.8;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:#ff2a2a;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px red;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px red;
}

/* IMAGE DROITE */

.hero-img img{
width:420px;
border-radius:20px;

/* 🔥 effet propre */
box-shadow:0 0 50px rgba(255,0,0,0.5);
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.feature{
background:#111;
padding:25px;
border-radius:15px;
width:250px;
text-align:center;
transition:0.3s;
}

.feature:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px black;
}

/* PANEL */

.panel{
display:none;
margin:40px auto;
width:80%;
max-width:800px;

background:linear-gradient(145deg,#8b0000,#400000);
border-radius:15px;
padding:30px;
text-align:center;

border:2px solid black;
box-shadow:0 10px 40px black;
}

/* MOBILE */

@media screen and (max-width:768px){
.hero{
flex-direction:column;
text-align:center;
}

.hero-img img{
width:300px;
}
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<div class="logo">KIRNOS</div>

<div class="menu">
<a onclick="openPanel('docs')">Documentation</a>
<a onclick="openPanel('premium')">Premium</a>
<a onclick="openPanel('status')">Status</a>
<a onclick="openPanel('support')">Support</a>
</div>
</div>

<!-- HERO -->

<div class="hero">

<div class="hero-left">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>

<a href="/connect" class="btn">Connecter TikTok</a>
</div>

<div class="hero-img">
<img src="/static/kirnos.jpg">
</div>

</div>

<!-- FEATURES -->

<div class="features">

<div class="feature">
<h3>IA Anti Troll</h3>
<p>Protection automatique</p>
</div>

<div class="feature">
<h3>Anti Raid</h3>
<p>Blocage des attaques</p>
</div>

<div class="feature">
<h3>Dashboard</h3>
<p>Stats en direct</p>
</div>

</div>

<!-- PANEL -->

<div id="panel" class="panel"></div>

<script>

function openPanel(type){

let panel = document.getElementById("panel");
panel.style.display = "block";

if(type === "docs"){
panel.innerHTML = `
<h2>Documentation</h2>
<p>Connexion TikTok</p>
<p>Activation protections</p>
<p>Configuration bot</p>
<p>1 semaine gratuite puis abonnement</p>
`;
}

if(type === "premium"){
panel.innerHTML = `
<h2>Premium</h2>
<p>1 mois : 10€</p>
<p>3 mois : 30€</p>
<p>6 mois : 50€</p>
<p>Paiement : Carte / PayPal</p>
`;
}

if(type === "status"){
panel.innerHTML = `
<h2>Status</h2>
<p>Serveur : En ligne</p>
<p>API : OK</p>
<p>Protection : Active</p>
`;
}

if(type === "support"){
panel.innerHTML = `
<h2>Support</h2>
<p><a href="https://discord.gg/72372NQEu" target="_blank">Discord</a></p>
<p><a href="https://twitter.com/KIRNOS350102" target="_blank">Twitter</a></p>
<p><a href="https://tiktok.com/@kirnos24" target="_blank">TikTok</a></p>
<p><a href="https://wa.me/33743260248" target="_blank">WhatsApp</a></p>
`;
}

}

</script>

</body>
</html>
