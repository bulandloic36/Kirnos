<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Kirnos</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
color:white;

background:linear-gradient(
120deg,
#0b0b0b,
#2a0000,
#5a0000,
#0b0b0b
);

background-size:400% 400%;
animation:bgmove 15s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff2a2a;
text-shadow:0 0 15px red;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
color:white;
text-decoration:none;
opacity:0.8;
}

.menu a:hover{
opacity:1;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
padding:80px 40px;
}

/* LEFT */

.hero-left{
max-width:500px;
}

.hero-left h1{
font-size:70px;
margin:0;
}

.hero-left p{
opacity:0.8;
margin-top:15px;
font-size:18px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:#ff2a2a;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px red;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px red;
}

/* IMAGE */

.hero-img img{
width:420px;
border-radius:20px;
box-shadow:0 0 40px red;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.feature{
background:#111;
padding:25px;
border-radius:12px;
width:250px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.feature h3{
color:#ff2a2a;
margin-top:0;
}

/* MOBILE */

@media screen and (max-width:768px){

.hero{
flex-direction:column;
text-align:center;
gap:40px;
padding:40px 20px;
}

.hero-left h1{
font-size:42px;
}

.hero-img img{
width:100%;
max-width:300px;
}

.menu{
display:none;
}

.features{
flex-direction:column;
align-items:center;
}

.feature{
width:90%;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
KIRNOS
</div>

<div class="menu">
<a href="#">Documentation</a>
<a href="#">Premium</a>
<a href="#">Status</a>
<a href="#">Support</a>
</div>

</div>


<div class="hero">

<div class="hero-left">

<h1>KIRNOS</h1>

<p>
Protection intelligente pour les lives TikTok
</p>

<a href="/connect" class="btn">
Connecter TikTok
</a>

</div>

<div class="hero-img">

<img src="/static/kirnos.jpg">

</div>

</div>


<div class="features">

<div class="feature">
<h3>IA Anti Troll</h3>
<p>Détection automatique des insultes et du spam.</p>
</div>

<div class="feature">
<h3>Anti Raid</h3>
<p>Protection contre les attaques de viewers.</p>
</div>

<div class="feature">
<h3>Dashboard Live</h3>
<p>Statistiques en temps réel pendant ton live.</p>
</div>

</div>

</body>
</html>
