<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔥 FOND DEGRADE */

body{
margin:0;
font-family:Arial;
color:white;

background:linear-gradient(120deg,#000,#1a0000,#5a0000,#000);
background-size:400% 400%;
animation:bgmove 12s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
color:#ff2a2a;
font-weight:bold;
font-size:24px;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
cursor:pointer;
color:white;
text-decoration:none;
opacity:0.8;
}

.menu a:hover{
color:#ff2a2a;
}

/* 🔥 VOLET (petit, propre) */

.dropdown{
display:none;
position:absolute;
top:70px;
right:40px;

background:rgba(0,0,0,0.8);
padding:20px 30px;
border-radius:10px;

box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
padding:80px 40px;
flex-wrap:wrap;
}

/* TEXTE */

.hero-left{
max-width:500px;
}

.hero-left h1{
font-size:70px;
margin:0;
}

.btn{
margin-top:20px;
display:inline-block;
padding:15px 35px;
background:#ff2a2a;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* IMAGE À DROITE */

.hero-img img{
width:420px;
border-radius:20px;
box-shadow:0 0 30px red;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.feature{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:12px;
width:250px;
text-align:center;
}

</style>

</head>

<body>

<!-- MENU -->

<div class="topbar">

<div class="logo">KIRNOS</div>

<div class="menu">
<a onclick="toggleMenu('docs')">Documentation</a>
<a onclick="toggleMenu('premium')">Premium</a>
<a onclick="toggleMenu('status')">Status</a>
<a onclick="toggleMenu('support')">Support</a>
</div>

</div>

<!-- 🔥 VOLET UNIQUE -->

<div id="dropdown" class="dropdown"></div>

<!-- HERO -->

<div class="hero">

<div class="hero-left">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>
<a href="/connect" class="btn">Connecter TikTok</a>
</div>

<div class="hero-img">
<img src="/static/kirnos.jpg">
</div>

</div>

<!-- FEATURES -->

<div class="features">

<div class="feature">
<h3>IA Anti Troll</h3>
<p>Protection automatique</p>
</div>

<div class="feature">
<h3>Anti Raid</h3>
<p>Blocage des attaques</p>
</div>

<div class="feature">
<h3>Dashboard</h3>
<p>Stats en direct</p>
</div>

</div>

<script>

let current = null;

function toggleMenu(type){

let box = document.getElementById("dropdown");

/* toggle fermer */
if(current === type){
box.style.display = "none";
current = null;
return;
}

current = type;
box.style.display = "block";

/* contenu */

if(type === "docs"){
box.innerHTML = `
<h3>Documentation</h3>
<p>Connexion TikTok</p>
<p>Configuration</p>
<p>Protection live</p>
`;
}

if(type === "premium"){
box.innerHTML = `
<h3>Premium</h3>
<p>1 mois : 10€</p>
<p>3 mois : 30€</p>
<p>6 mois : 50€</p>
<p>Carte / PayPal</p>
`;
}

if(type === "status"){
box.innerHTML = `
<h3>Status</h3>
<p>Serveur : En ligne</p>
<p>API : Fonctionnelle</p>
<p>Protection : Active</p>
`;
}

if(type === "support"){
box.innerHTML = `
<h3>Support</h3>
<p>Discord</p>
<p>Twitter / X</p>
<p>TikTok</p>
<p>WhatsApp</p>
`;
}

}

</script>

</body>
</html>
