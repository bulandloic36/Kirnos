<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Kirnos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
color:white;

/* 🔥 IMAGE CLEAN + DESCENDUE */
background:url("/static/kirnos.jpg");
background-size:cover;
background-position:center 65%;
background-repeat:no-repeat;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff2a2a;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
color:white;
text-decoration:none;
cursor:pointer;
opacity:0.8;
}

.menu a:hover{
opacity:1;
color:#ff2a2a;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:70px;
margin:0;
}

.hero p{
opacity:0.8;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.feature{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:12px;
width:250px;
text-align:center;
}

/* 🔥 PANEL (LE TRUC ROUGE EN DESSOUS) */

.panel{
display:none;
margin:40px auto;
width:80%;
max-width:800px;

background:linear-gradient(145deg,#8b0000,#400000);
border-radius:15px;
padding:30px;
text-align:center;

/* contour noir */
border:2px solid black;

box-shadow:
0 10px 40px rgba(0,0,0,0.9);
}

/* MOBILE */

@media screen and (max-width:768px){
.menu{
flex-direction:column;
gap:10px;
}
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<div class="logo">KIRNOS</div>

<div class="menu">
<a onclick="openPanel('docs')">Documentation</a>
<a onclick="openPanel('premium')">Premium</a>
<a onclick="openPanel('status')">Status</a>
<a onclick="openPanel('support')">Support</a>
</div>
</div>

<!-- HERO -->

<div class="hero">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>
</div>

<!-- FEATURES -->

<div class="features">

<div class="feature">
<h3>IA Anti Troll</h3>
<p>Protection automatique</p>
</div>

<div class="feature">
<h3>Anti Raid</h3>
<p>Blocage des attaques</p>
</div>

<div class="feature">
<h3>Dashboard</h3>
<p>Stats en direct</p>
</div>

</div>

<!-- 🔥 PANEL DYNAMIQUE -->

<div id="panel" class="panel"></div>

<script>

function openPanel(type){

let panel = document.getElementById("panel");

panel.style.display = "block";

if(type === "docs"){
panel.innerHTML = `
<h2>Documentation</h2>
<p>Connexion au bot TikTok</p>
<p>Activation des protections</p>
<p>Configuration du chat</p>
<p>1 semaine gratuite puis abonnement</p>
`;
}

if(type === "premium"){
panel.innerHTML = `
<h2>Premium</h2>
<p>1 mois : 10€</p>
<p>3 mois : 30€</p>
<p>6 mois : 50€</p>
<br>
<p>Paiement : Carte bancaire / PayPal</p>
`;
}

if(type === "status"){
panel.innerHTML = `
<h2>Status</h2>
<p>Serveur : En ligne</p>
<p>API TikTok : Fonctionnelle</p>
<p>Protection : Active</p>
`;
}

if(type === "support"){
panel.innerHTML = `
<h2>Support</h2>
<p><a href="https://discord.gg/72372NQEu" target="_blank">Discord</a></p>
<p><a href="https://twitter.com/KIRNOS350102" target="_blank">Twitter / X</a></p>
<p><a href="https://tiktok.com/@kirnos24" target="_blank">TikTok</a></p>
<p><a href="https://wa.me/33743260248" target="_blank">WhatsApp</a></p>
`;
}

}

</script>

</body>
</html>
