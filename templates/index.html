<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#0a0a0a;
color:white;
}

/* ===== BACKGROUND ===== */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 20%, #ff000033, transparent),
radial-gradient(circle at 80% 80%, #ff000022, transparent);
z-index:-1;
}

/* ===== NAVBAR ===== */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
z-index:1000;
}

/* LOGO LEFT */
.logo{
position:absolute;
left:40px;
color:#ff2a2a;
font-weight:bold;
font-size:22px;
}

/* MENU CENTER */
.menu{
display:flex;
gap:40px;
}

.menu a{
text-decoration:none;
color:white;
opacity:0.7;
transition:0.3s;
}

.menu a:hover{
opacity:1;
color:#ff2a2a;
}

/* ===== HERO ===== */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
gap:20px;
padding-top:80px;
}

/* TITLE */

.hero h1{
font-size:80px;
text-shadow:0 0 20px rgba(255,0,0,0.5);
}

.hero p{
opacity:0.7;
}

/* BUTTON */

.btn{
margin-top:15px;
padding:15px 40px;
background:#ff2a2a;
border-radius:40px;
text-decoration:none;
color:white;
font-weight:bold;
box-shadow:0 0 25px red;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* IMAGE */

.hero img{
margin-top:20px;
width:420px;
border-radius:20px;
box-shadow:0 0 80px rgba(255,0,0,0.6);
}

/* ===== FEATURES ===== */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:60px 20px;
}

/* CARDS */

.card{
background:#111;
padding:25px;
border-radius:15px;
width:250px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px red;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">KIRNOS</div>

<div class="menu">
<a href="/documentation">Documentation</a>
<a href="/faq">FAQ</a>
<a href="/support">Support</a>
</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>

<a href="/login/tiktok" class="btn">Connexion TikTok</a>

<img src="/static/kirnos.jpg">

</div>

<!-- FEATURES -->

<div class="features">

<div class="card">
<h3>IA Anti Troll</h3>
<p>Blocage automatique</p>
</div>

<div class="card">
<h3>Anti Raid</h3>
<p>Sécurité des lives</p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Stats en temps réel</p>
</div>

</div>

</body>
</html>
