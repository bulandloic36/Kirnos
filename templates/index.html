<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
color:white;

/* 🔥 IMAGE UNIQUE */
background:url("/static/kirnos.jpg");
background-size:cover;
background-position:center 75%;
background-repeat:no-repeat;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff2a2a;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
color:white;
text-decoration:none;
cursor:pointer;
opacity:0.8;
}

.menu a:hover{
color:#ff2a2a;
}

/* 🔥 PANEL JUSTE SOUS LE MENU */

.panel{
display:none;
width:100%;
padding:20px;
text-align:center;

/* 🔥 TRANSPARENT PRO */
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);

border-top:1px solid rgba(255,255,255,0.1);
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* HERO */

.hero{
text-align:center;

/* 🔥 DESCEND LE TEXTE (évite la tête) */
padding:180px 20px 80px;
}

.hero h1{
font-size:70px;
margin:0;
}

.hero p{
opacity:0.8;
margin-top:10px;
}

/* BOUTON */

.btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:#ff2a2a;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px red;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.feature{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:12px;
width:250px;
text-align:center;
}

/* MOBILE */

@media screen and (max-width:768px){
.hero{
padding-top:140px;
}
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<div class="logo">KIRNOS</div>

<div class="menu">
<a onclick="openPanel('docs')">Documentation</a>
<a onclick="openPanel('premium')">Premium</a>
<a onclick="openPanel('status')">Status</a>
<a onclick="openPanel('support')">Support</a>
</div>
</div>

<!-- 🔥 PANEL ICI (JUSTE SOUS LE MENU) -->
<div id="panel" class="panel"></div>

<!-- HERO -->

<div class="hero">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>

<a href="/connect" class="btn">Connecter TikTok</a>
</div>

<!-- FEATURES -->

<div class="features">

<div class="feature">
<h3>IA Anti Troll</h3>
<p>Protection automatique</p>
</div>

<div class="feature">
<h3>Anti Raid</h3>
<p>Blocage des attaques</p>
</div>

<div class="feature">
<h3>Dashboard</h3>
<p>Stats en direct</p>
</div>

</div>

<script>

function openPanel(type){

let panel = document.getElementById("panel");
panel.style.display = "block";

/* SCROLL AUTO EN HAUT */
window.scrollTo({top:0, behavior:'smooth'});

if(type === "docs"){
panel.innerHTML = `
<h3>Documentation</h3>
<p>Connexion TikTok</p>
<p>Activation des protections</p>
<p>Configuration du bot</p>
<p>1 semaine gratuite</p>
`;
}

if(type === "premium"){
panel.innerHTML = `
<h3>Premium</h3>
<p>1 mois : 10€</p>
<p>3 mois : 30€</p>
<p>6 mois : 50€</p>
<p>Paiement : Carte / PayPal</p>
`;
}

if(type === "status"){
panel.innerHTML = `
<h3>Status</h3>
<p>Serveur : En ligne</p>
<p>API : Fonctionnelle</p>
<p>Protection : Active</p>
`;
}

if(type === "support"){
panel.innerHTML = `
<h3>Support</h3>
<p><a href="https://discord.gg/72372NQEu" target="_blank">Discord</a></p>
<p><a href="https://twitter.com/KIRNOS350102" target="_blank">Twitter</a></p>
<p><a href="https://tiktok.com/@kirnos24" target="_blank">TikTok</a></p>
<p><a href="https://wa.me/33743260248" target="_blank">WhatsApp</a></p>
`;
}

}

</script>

</body>
</html>
