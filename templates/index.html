<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔥 PLEIN ECRAN */

body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
overflow:hidden;

background:linear-gradient(120deg,#000,#1a0000,#5a0000,#000);
background-size:400% 400%;
animation:bgmove 12s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
color:#ff2a2a;
font-weight:bold;
font-size:24px;
}

/* MENU */

.menu{
display:flex;
gap:30px;
}

.menu div{
cursor:pointer;
position:relative;
}

.menu div:hover{
color:#ff2a2a;
}

/* DROPDOWN */

.dropdown{
display:none;
position:absolute;
top:30px;
left:0;

background:#111;
border-radius:10px;
padding:10px 0;
min-width:200px;

box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.dropdown a{
display:block;
padding:10px 20px;
color:white;
text-decoration:none;
}

.dropdown a:hover{
background:#ff2a2a;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
height:calc(100vh - 100px);
}

/* TEXTE */

.hero-left{
max-width:500px;
}

.hero-left h1{
font-size:70px;
margin:0;
}

.btn{
margin-top:20px;
display:inline-block;
padding:15px 35px;
background:#ff2a2a;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* IMAGE */

.hero-img img{
width:420px;
border-radius:20px;
box-shadow:0 0 30px red;
}

/* STATUS COLORS */

.online{
color:#00ff00;
}

.offline{
color:red;
}

</style>

</head>

<body>

<!-- MENU -->

<div class="topbar">

<div class="logo">KIRNOS</div>

<div class="menu">

<div onclick="toggle('docs')">
Documentation
<div id="docs" class="dropdown">
<a>📌 À quoi ça sert ?</a>
<a>⚙️ Comment utiliser</a>
<a>💎 Premium</a>
</div>
</div>

<div onclick="toggle('premium')">
Premium
<div id="premium" class="dropdown">
<a>1 semaine gratuite</a>
<a>1 mois : 10€</a>
<a>3 mois : 30€</a>
<a>6 mois : 50€</a>
<a>Paiement : Carte / PayPal</a>
</div>
</div>

<div onclick="toggle('status')">
Status
<div id="status" class="dropdown">
<a id="botStatus">Chargement...</a>
</div>
</div>

<div onclick="toggle('support')">
Support
<div id="support" class="dropdown">
<a href="https://discord.gg/72372NQEu" target="_blank">Discord</a>
<a href="https://twitter.com/KIRNOS350102" target="_blank">Twitter / X</a>
<a href="https://tiktok.com/@kirnos24" target="_blank">TikTok</a>
<a href="https://wa.me/33743260248" target="_blank">WhatsApp</a>
</div>
</div>

</div>

</div>

<!-- HERO -->

<div class="hero">

<div class="hero-left">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>
<a href="/connect" class="btn">Connecter TikTok</a>
</div>

<div class="hero-img">
<img src="/static/kirnos.jpg">
</div>

</div>

<!-- JS -->

<script>

/* MENU */

function toggle(id){

let all = document.querySelectorAll('.dropdown');

all.forEach(menu=>{
if(menu.id !== id){
menu.style.display = "none";
}
});

let current = document.getElementById(id);

if(current.style.display === "block"){
current.style.display = "none";
}else{
current.style.display = "block";
}

}

/* STATUS AUTO */

let botOnline = true; // 🔥 CHANGE ICI (true ou false)

let statusText = document.getElementById("botStatus");

if(botOnline){
statusText.innerHTML = "🟢 Bot en ligne";
statusText.classList.add("online");
}else{
statusText.innerHTML = "🔴 Bot hors ligne";
statusText.classList.add("offline");
}

</script>

</body>
</html>
