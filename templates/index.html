<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KIRNOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* ===== BACKGROUND ===== */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 20%, #ff000033, transparent),
radial-gradient(circle at 80% 80%, #ff000022, transparent);
z-index:-1;
}

/* ===== NAVBAR ===== */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
position:fixed;
width:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
color:#ff2a2a;
font-weight:bold;
font-size:22px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:white;
opacity:0.7;
transition:0.3s;
}

.menu a:hover{
opacity:1;
color:#ff2a2a;
}

/* ===== HERO ===== */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
gap:80px;
padding:0 100px;
}

/* LEFT */

.left{
max-width:500px;
}

.left h1{
font-size:70px;
text-shadow:0 0 20px rgba(255,0,0,0.4);
}

.left p{
margin-top:10px;
opacity:0.7;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:25px;
padding:15px 40px;
background:#ff2a2a;
border-radius:40px;
text-decoration:none;
color:white;
font-weight:bold;
box-shadow:0 0 25px red;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* IMAGE */

.right img{
width:420px;
border-radius:20px;
box-shadow:0 0 80px rgba(255,0,0,0.6);
}

/* ===== FEATURES ===== */

.features{
padding:80px 100px;
display:flex;
gap:30px;
justify-content:center;
}

.card{
background:#111;
padding:30px;
border-radius:15px;
width:250px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px red;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<div class="logo">KIRNOS</div>

<div class="menu">
<a href="/documentation">Documentation</a>
<a href="/faq">FAQ</a>
<a href="/support">Support</a>
</div>
</div>

<!-- HERO -->

<div class="hero">

<div class="left">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>

<a href="/login/tiktok" class="btn">Connecter TikTok</a>
</div>

<div class="right">
<img src="/static/kirnos.jpg">
</div>

</div>

<!-- FEATURES -->

<div class="features">

<div class="card">
<h3>IA Anti Troll</h3>
<p>Blocage automatique des messages toxiques</p>
</div>

<div class="card">
<h3>Anti Raid</h3>
<p>Protection contre les attaques massives</p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Statistiques en temps réel</p>
</div>

</div>

</body>
</html>
