<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>KIRNOS</title>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#3a0000,#000);
}

/* ===== NAVBAR ===== */

.navbar{
display:flex;
justify-content:space-between;
padding:20px 60px;
align-items:center;
}

.logo{
color:#ff2a2a;
font-size:20px;
font-weight:bold;
}

/* ===== MENU ===== */

.menu{
display:flex;
gap:30px;
}

.menu a{
color:white;
text-decoration:none;
opacity:0.8;
}

.menu a:hover{
color:#ff2a2a;
}

/* ===== HERO ===== */

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:100px;
}

/* LEFT */

.left h1{
font-size:80px;
margin:0;
text-shadow:0 0 20px red;
}

.left p{
margin-top:10px;
opacity:0.7;
}

/* BUTTON */

.btn{
margin-top:25px;
display:inline-block;
padding:15px 35px;
background:#ff2a2a;
border-radius:40px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 25px red;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* RIGHT IMAGE */

.right img{
width:420px;
border-radius:20px;
box-shadow:0 0 80px rgba(255,0,0,0.8);
}

/* ===== CARDS ===== */

.cards{
display:flex;
gap:30px;
padding:0 100px;
margin-top:40px;
}

.card{
flex:1;
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px red;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">KIRNOS</div>

<div class="menu">
<a href="/documentation">Documentation</a>
<a href="/faq">FAQ</a>
</div>

<!-- HERO -->

<div class="hero">

<div class="left">
<h1>KIRNOS</h1>
<p>Protection intelligente pour les lives TikTok</p>

<a href="/login/tiktok" class="btn">Connecter TikTok</a>
</div>

<div class="right">
<img src="/static/kirnos.jpg">
</div>

</div>

<!-- FEATURES -->

<div class="cards">

<div class="card">
<h3>IA Anti Troll</h3>
<p>Blocage automatique</p>
</div>

<div class="card">
<h3>Anti Raid</h3>
<p>Sécurité avancée</p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Stats en temps réel</p>
</div>

</div>

</body>
</html>
